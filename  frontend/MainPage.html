<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="styles.css">
    <title>MathMech Rooms - Регистрация</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="MainPage.css">
</head>

<body>
    <div class="menu">
        <button id="openModalBtn" class="modal-btn user-button">
            <img src="icons/user.png" class="menu-icon user-icon">
        </button>
        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <button class="myTable-btn">
                    <img src="icons/list.png" class="modalIcon">
                    Мое расписание</button>
                <button class="addBron-btn">
                    <img src="icons/add.png" class="modalIcon">
                    Добавить бронь</button>
                <button class="myBron-btn">
                    <img src="icons/list.png" class="modalIcon">
                    Мои брони</button>
            </div>
        </div>
        <a>Название/Иконка | Текущая пара</a>
        <button class="search-button">
            <img src="icons/search.png" class="menu-icon search-icon">
        </button>
    </div>
    <script src="Modalscript.js"></script>
    <canvas id="c" class="container h-75" width="1000px" height="600px" style="border: solid 1px blue"></canvas>
    <div id="myModalRoom" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="cabinet">Кабинет 622а</div>
                <div class="time">Пара: 9:00 - 10:30</div>
                <button class="makeBron">Ну пусть забронировать</button>
            </div>
        </div>
    <script src="map.js" defer></script>
</body>
